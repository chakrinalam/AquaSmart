<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | AquaSmart</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="toast-container" id="toastContainer"></div>

    <div class="glass-container" id="authBox">
        <h1>Forgot Password</h1>
        <p style="text-align: center; margin-bottom: 30px;">Enter your email address to receive a password reset link.</p>

        <form id="forgotPasswordForm">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" required placeholder="Enter your email address">
            </div>
            <button type="submit" class="btn">Send Reset Link</button>
            <p style="text-align: center; margin-top: 20px;">
                <a href="index.html" style="color: var(--primary); text-decoration: none;">← Back to Login</a>
            </p>
        </form>
    </div>

    <script src="js/api.js"></script>
    <script src="js/forgotPassword.js"></script>
</body>

</html>
