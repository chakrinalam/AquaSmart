<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | AquaSmart</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="toast-container" id="toastContainer"></div>

    <div class="glass-container" id="authBox">
        <h1>Reset Password</h1>
        <p style="text-align: center; margin-bottom: 30px;">Enter your new password below.</p>

        <form id="resetPasswordForm">
            <input type="hidden" id="resetToken">
            
            <div class="form-group">
                <label>New Password</label>
                <input type="password" id="password" required placeholder="Enter new password" minlength="6">
            </div>
            
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="confirmPassword" required placeholder="Confirm new password" minlength="6">
            </div>
            
            <button type="submit" class="btn">Reset Password</button>
            <p style="text-align: center; margin-top: 20px;">
                <a href="index.html" style="color: var(--primary); text-decoration: none;">← Back to Login</a>
            </p>
        </form>
    </div>

    <script src="js/api.js"></script>
    <script src="js/resetPassword.js"></script>
</body>

</html>
