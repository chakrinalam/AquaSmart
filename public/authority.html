<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authority | AquaSmart</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <div class="toast-container" id="toastContainer"></div>

    <nav>
        <div class="nav-brand">AquaSmart <span style="color:#fff; font-size:1rem; font-weight:400;">| Authority Dashboard</span></div>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </nav>

    <div class="dashboard-wrapper">
        <!-- Risk Zones Dashboard -->
        <div class="glass-container" style="max-width: 100%;">
            <h2>Live Risk Zones Analysis</h2>
            <div class="stats-grid" id="riskGrid">
                <!-- Dynamically populated -->
            </div>
        </div>

        <div class="glass-container" style="max-width: 100%;">
            <h2>Complaint Management</h2>
            <table>
                <thead>
                    <tr>
                        <th>Area</th>
                        <th>Citizen</th>
                        <th>Description</th>
                        <th>Severity</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="allComplaints">
                    <!-- Dynamic Rows -->
                </tbody>
            </table>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/authority.js"></script>
</body>
</html>
